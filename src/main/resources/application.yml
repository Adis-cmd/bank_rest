spring:
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: Bank Cards

  datasource:
    url: jdbc:postgresql://db:5432/bankdb
    username: bank-rest
    password: bank-rest-password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:/db/migration/master.yaml
    enabled: true

server:
  port: 8099

jwt:
  secret: BanKey_a8f3j2k9m5n7p1q4r6s2t0u2v4w6x12y5
  lifetime: 86400000

card:
  encryption:
    key: 9876543210987654
  card-expiration-years: 3
  max-transfer-amount: 500000
